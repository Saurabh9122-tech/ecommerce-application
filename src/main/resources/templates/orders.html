<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>My Orders - ShopEase</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
          rel="stylesheet">


    <style>


        body{

            background:#f4f6f9;
            font-family:'Segoe UI',sans-serif;

        }



        .page-title{

            font-weight:700;
            color:#212529;

        }



        .order-card{

            background:white;
            border:none;
            border-radius:20px;
            box-shadow:0 8px 25px rgba(0,0,0,.08);
            transition:.3s;

        }


        .order-card:hover{

            transform:translateY(-5px);
            box-shadow:0 15px 35px rgba(0,0,0,.12);

        }



        .product-img{

            width:130px;
            height:130px;
            object-fit:contain;
            border-radius:15px;
            background:#f8f9fa;

        }



        .product-name{

            font-size:20px;
            font-weight:700;

        }



        .price{

            font-size:28px;
            font-weight:700;
            color:#198754;

        }



        .badge-status{

            padding:10px 20px;
            border-radius:30px;
            font-weight:600;

        }


        .pending{

            background:#fff3cd;
            color:#856404;

        }


        .processing{

            background:#cff4fc;
            color:#055160;

        }


        .shipped{

            background:#cfe2ff;
            color:#084298;

        }


        .delivered{

            background:#198754;
            color:white;

        }


        .cancelled{

            background:#dc3545;
            color:white;

        }




        .payment-box{

            background:#f8f9fa;
            border-radius:12px;
            padding:10px 15px;

        }



        .action-btn{

            border-radius:25px;
            font-weight:600;

        }




        .order-footer{

            border-top:1px solid #eee;
            margin-top:20px;
            padding-top:15px;

        }



    </style>


</head>



<body>



<div class="container py-5">



    <h2 class="page-title mb-4">

        <i class="bi bi-bag-check-fill text-primary"></i>

        My Orders

    </h2>




    <div th:if="${orders.isEmpty()}"
         class="text-center py-5">


        <i class="bi bi-cart-x display-1 text-secondary"></i>


        <h3 class="mt-3">
            No Orders Yet
        </h3>


        <a href="/products"
           class="btn btn-primary rounded-pill">

            Continue Shopping

        </a>


    </div>





    <div th:each="order:${orders}"
         class="card order-card mb-4">



        <div class="card-body p-4">



            <div class="row align-items-center">



                <!-- IMAGE -->

                <div class="col-md-2 text-center">


                    <img th:if="${order.product != null}"
                         th:src="@{'/uploads/'+${order.product.imageName}}"
                         class="product-img">


                </div>





                <!-- DETAILS -->


                <div class="col-md-4">


                    <h4 class="product-name"
                        th:if="${order.product != null}"
                        th:text="${order.product.name}">

                    </h4>



                    <p class="text-muted mb-1">

                        <i class="bi bi-receipt"></i>

                        Order ID :

                        <b th:text="${order.id}">
                        </b>

                    </p>




                    <p class="text-muted">

                        <i class="bi bi-calendar"></i>

                        <span th:text="${order.orderDate != null ?
#temporals.format(order.orderDate,'dd MMM yyyy')
:'N/A'}">

</span>

                    </p>



                </div>





                <!-- PRICE -->


                <div class="col-md-2 text-center">


                    <div class="price">

                        ₹ <span th:text="${order.totalAmount}">
</span>

                    </div>


                    <p class="text-muted">
                        Total Amount
                    </p>


                </div>






                <!-- STATUS -->


                <div class="col-md-2 text-center">


<span class="badge-status"
      th:classappend="${order.status != null ? order.status.toLowerCase():'pending'}"
      th:text="${order.status}">
</span>



                    <div class="payment-box mt-3">


                        <i class="bi bi-credit-card"></i>


                        Payment :

                        <span class="text-success fw-bold"
                              th:if="${order.payment != null}"
                              th:text="${order.payment.paymentStatus}">

</span>


                        <span class="text-danger fw-bold"
                              th:if="${order.payment == null}">

NOT PAID

</span>


                    </div>



                </div>






                <!-- ACTIONS -->


                <div class="col-md-2">



                    <a th:if="${order.product != null}"
                       th:href="@{/products/{id}(id=${order.product.id})}"
                       class="btn btn-outline-primary w-100 action-btn mb-2">


                        <i class="bi bi-eye"></i>

                        Product

                    </a>





                    <a th:href="@{/orders/invoice/{id}(id=${order.id})}"
                       class="btn btn-success w-100 action-btn mb-2">


                        <i class="bi bi-file-earmark-text"></i>

                        Invoice


                    </a>






                    <form th:if="${order.status=='PENDING'}"
                          th:action="@{/orders/cancel/{id}(id=${order.id})}"
                          method="post">


                        <button class="btn btn-danger w-100 action-btn">


                            <i class="bi bi-x-circle"></i>

                            Cancel


                        </button>


                    </form>



                </div>



            </div>






            <!-- STATUS MESSAGE -->


            <div class="order-footer">



                <div th:if="${order.status=='PROCESSING'}"
                     class="alert alert-info">


                    <i class="bi bi-hourglass-split"></i>

                    Your order is being processed.


                </div>




                <div th:if="${order.status=='SHIPPED'}"
                     class="alert alert-primary">


                    <i class="bi bi-truck"></i>

                    Your order has been shipped.


                </div>




                <div th:if="${order.status=='DELIVERED'}"
                     class="alert alert-success">


                    <i class="bi bi-check-circle"></i>

                    Delivered successfully.


                </div>




                <div th:if="${order.status=='CANCELLED'}"
                     class="alert alert-danger">


                    <i class="bi bi-x-circle"></i>

                    This order has been cancelled.


                </div>



            </div>



        </div>


    </div>




</div>


</body>

</html>
