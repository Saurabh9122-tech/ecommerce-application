<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Buy Now</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="bg-light">


<div class="container mt-5">


    <h2 class="mb-4">
        Confirm Order
    </h2>


    <form th:action="@{/orders/buy-place}"
          method="post"
          th:object="${order}">


        <input type="hidden"
               name="productId"
               th:value="${product.id}">


        <div class="card shadow p-4">


            <h4 th:text="${product.name}"></h4>


            <p>
                Price:
                ₹ <span th:text="${product.price}"></span>
            </p>


            <hr>


            <div class="mb-3">

                <label>
                    Customer Name
                </label>

                <input class="form-control"
                       th:field="*{customerName}"
                       required>

            </div>


            <div class="mb-3">

                <label>
                    Email
                </label>

                <input class="form-control"
                       th:field="*{email}"
                       required>

            </div>


            <div class="mb-3">

                <label>
                    Address
                </label>

                <textarea class="form-control"
                          th:field="*{address}"
                          required>
</textarea>

            </div>


            <button class="btn btn-success">

                Place Order

            </button>


        </div>


    </form>


</div>


</body>

</html>
