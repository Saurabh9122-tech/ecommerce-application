<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Add Product</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header bg-primary text-white">

            <h3>Product Form</h3>

        </div>

        <div class="card-body">

            <form th:action="@{/products/save}"

                  th:object="${product}"

                  method="post">

                <input type="hidden"

                       th:field="*{id}">

                <div class="mb-3">

                    <label>Name</label>

                    <input class="form-control"

                           th:field="*{name}">

                </div>

                <div class="mb-3">

                    <label>Description</label>

                    <textarea class="form-control"

                              th:field="*{description}">

                    </textarea>

                </div>

                <div class="mb-3">

                    <label>Price</label>

                    <input type="number"

                           step="0.01"

                           class="form-control"

                           th:field="*{price}">

                </div>

                <div class="mb-3">

                    <label>Stock</label>

                    <input type="number"

                           class="form-control"

                           th:field="*{stock}">

                </div>

                <div class="mb-3">

                    <label>Image URL</label>

                    <input class="form-control"

                           th:field="*{imageUrl}">

                </div>

                <button class="btn btn-primary">

                    Save Product

                </button>

                <a href="/products"

                   class="btn btn-secondary">

                    Back

                </a>

            </form>

        </div>

    </div>

</div>

</body>

</html>
