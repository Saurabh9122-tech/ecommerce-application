<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Admin Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <h2 class="mb-4">📊 Admin Dashboard</h2>

    <div class="row">

        <div class="col-md-3">

            <div class="card bg-primary text-white mb-3">

                <div class="card-body text-center">

                    <h3 th:text="${productCount}"></h3>

                    <h5>Products</h5>

                </div>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card bg-success text-white mb-3">

                <div class="card-body text-center">

                    <h3 th:text="${categoryCount}"></h3>

                    <h5>Categories</h5>

                </div>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card bg-warning text-dark mb-3">

                <div class="card-body text-center">

                    <h3 th:text="${orderCount}"></h3>

                    <h5>Orders</h5>

                </div>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card bg-danger text-white mb-3">

                <div class="card-body text-center">

                    <h3 th:text="${userCount}"></h3>

                    <h5>Users</h5>

                </div>

            </div>

        </div>

    </div>

    <hr>

    <div class="d-flex gap-2">

        <a href="/products" class="btn btn-primary">Products</a>

        <a href="/categories" class="btn btn-success">Categories</a>

        <a href="/orders" class="btn btn-warning">Orders</a>

    </div>

</div>

</body>

</html>
