<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Payment - ShopEase</title>


    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">


    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
          rel="stylesheet">



    <style>


        body{

            background:#f4f6f9;
            font-family:'Segoe UI',sans-serif;

        }



        .payment-card{

            border:none;
            border-radius:20px;
            box-shadow:0 10px 30px rgba(0,0,0,.12);
            overflow:hidden;

        }



        .header{

            background:linear-gradient(135deg,#198754,#20c997);
            color:white;
            padding:25px;

        }



        .amount{

            font-size:32px;
            font-weight:700;
            color:#198754;

        }



        .payment-option{

            border:2px solid #eee;
            border-radius:15px;
            padding:15px;
            cursor:pointer;
            transition:.3s;

        }



        .payment-option:hover{

            border-color:#198754;
            background:#f1fff8;

        }



        .payment-icon{

            font-size:30px;
            color:#198754;

        }



        .pay-btn{

            border-radius:30px;
            padding:12px;
            font-size:18px;
            font-weight:600;

        }


    </style>


</head>



<body>



<div class="container py-5">



    <div class="row justify-content-center">



        <div class="col-md-6">



            <div class="card payment-card">



                <div class="header text-center">


                    <h2>

                        <i class="bi bi-credit-card"></i>

                        Payment

                    </h2>


                    <p class="mb-0">

                        Secure Checkout

                    </p>


                </div>





                <div class="card-body p-4">





                    <!-- ORDER DETAILS -->

                    <div class="mb-4">


                        <h5>

                            <i class="bi bi-bag"></i>

                            Order Summary

                        </h5>


                        <hr>



                        <div th:if="${order != null}">


                            <p>

                                Customer :

                                <b th:text="${order.customerName}">
                                </b>


                            </p>



                            <p>

                                Amount :

                                <span class="amount">

₹

<span th:text="${order.totalAmount}">
</span>

</span>


                            </p>


                        </div>



                    </div>






                    <form th:action="@{/payment/process}"
                          method="post">





                        <h5 class="mb-3">

                            Select Payment Method

                        </h5>






                        <div class="mb-3">



                            <label class="payment-option d-flex align-items-center">


                                <input type="radio"
                                       name="paymentMethod"
                                       value="Cash On Delivery"
                                       checked
                                       class="me-3">


                                <i class="bi bi-truck payment-icon me-3"></i>


                                <div>

                                    <b>
                                        Cash On Delivery
                                    </b>

                                    <br>

                                    <small class="text-muted">
                                        Pay when product arrives
                                    </small>

                                </div>


                            </label>



                        </div>






                        <div class="mb-3">


                            <label class="payment-option d-flex align-items-center">


                                <input type="radio"
                                       name="paymentMethod"
                                       value="UPI"
                                       class="me-3">


                                <i class="bi bi-phone payment-icon me-3"></i>



                                <div>

                                    <b>
                                        UPI Payment
                                    </b>

                                    <br>

                                    <small class="text-muted">
                                        Google Pay / PhonePe / Paytm
                                    </small>

                                </div>


                            </label>



                        </div>







                        <div class="mb-4">


                            <label class="payment-option d-flex align-items-center">


                                <input type="radio"
                                       name="paymentMethod"
                                       value="Card"
                                       class="me-3">


                                <i class="bi bi-credit-card payment-icon me-3"></i>



                                <div>


                                    <b>
                                        Debit / Credit Card
                                    </b>


                                    <br>

                                    <small class="text-muted">
                                        Secure card payment
                                    </small>


                                </div>



                            </label>



                        </div>






                        <input type="hidden"
                               name="paymentStatus"
                               value="PAID">






                        <button class="btn btn-success w-100 pay-btn">


                            <i class="bi bi-lock-fill"></i>


                            Pay Now


                        </button>





                    </form>





                </div>


            </div>



        </div>



    </div>



</div>



</body>


</html>
