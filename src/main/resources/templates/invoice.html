<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Invoice</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">


    <style>

        body{
            background:#f5f5f5;
        }


        .invoice-box{

            background:white;
            padding:40px;
            margin-top:40px;
            border-radius:15px;
            box-shadow:0 5px 20px rgba(0,0,0,.1);

        }


        .product-img{

            width:80px;
            height:80px;
            object-fit:contain;

        }


        @media print{

            .print-btn{
                display:none;
            }

        }


    </style>


</head>


<body>


<div class="container">


    <div class="invoice-box">



        <div class="d-flex justify-content-between align-items-center">


            <h2>
                🛒 ShopEase
            </h2>


            <button onclick="window.print()"
                    class="btn btn-primary print-btn">

                Print / Save PDF

            </button>


        </div>



        <hr>



        <h4>
            Invoice
        </h4>



        <p>
            <b>Invoice No:</b>

            <span th:text="${order.id}">
            </span>

        </p>



        <p>

            <b>Date:</b>

            <span th:text="${order.orderDate}">
            </span>

        </p>



        <hr>



        <!-- Customer -->

        <h5>
            Customer Details
        </h5>


        <p>
            <b>Name:</b>

            <span th:text="${order.customerName}">
            </span>

        </p>



        <p>

            <b>Email:</b>

            <span th:text="${order.email}">
            </span>

        </p>



        <p>

            <b>Address:</b>

            <span th:text="${order.address}">
            </span>

        </p>




        <hr>



        <!-- Product -->

        <h5>
            Product Details
        </h5>



        <table class="table table-bordered">


            <thead class="table-dark">

            <tr>

                <th>
                    Product
                </th>


                <th>
                    Price
                </th>

            </tr>


            </thead>



            <tbody>


            <tr th:if="${order.product != null}">


                <td>


                    <a th:href="@{/products/{id}(id=${order.product.id})}"
                       th:text="${order.product.name}">

                    </a>


                </td>



                <td>

                    ₹

                    <span th:text="${order.product.price}">
                    </span>

                </td>



            </tr>



            </tbody>



        </table>





        <hr>



        <!-- Price Details -->


        <table class="table">


            <tr>

                <td>
                    Subtotal
                </td>


                <td>

                    ₹

                    <span th:text="${order.totalAmount}">
                    </span>

                </td>


            </tr>




            <tr>

                <td>
                    GST (18%)
                </td>


                <td>

                    ₹

                    <span th:text="${order.totalAmount * 0.18}">
                    </span>

                </td>


            </tr>




            <tr>

                <td>
                    CGST (9%)
                </td>


                <td>

                    ₹

                    <span th:text="${order.totalAmount * 0.09}">
                    </span>

                </td>


            </tr>




            <tr>

                <td>
                    SGST (9%)
                </td>


                <td>

                    ₹

                    <span th:text="${order.totalAmount * 0.09}">
                    </span>

                </td>


            </tr>




            <tr class="fw-bold">


                <td>
                    Grand Total
                </td>


                <td>

                    ₹

                    <span th:text="${order.totalAmount * 1.18}">
                    </span>

                </td>


            </tr>


        </table>





        <hr>



        <!-- Payment Details -->


        <h5>
            Payment Details
        </h5>



        <p>

            <b>Payment Method:</b>


            <span th:text="${order.paymentMethod != null ? order.paymentMethod : 'N/A'}">
            </span>


        </p>




        <p>


            <b>Payment Status:</b>



            <span class="badge bg-success"
                  th:text="${order.paymentStatus != null ? order.paymentStatus : 'NOT PAID'}">

            </span>


        </p>




        <p>

            <b>Order Status:</b>


            <span th:text="${order.status}">
            </span>


        </p>




        <hr>




        <h5 class="text-center mt-4">

            Thank you for shopping with ShopEase ❤️

        </h5>




    </div>


</div>



</body>


</html>
