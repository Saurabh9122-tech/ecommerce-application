<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Invoice</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header bg-dark text-white">

            <h2>Invoice</h2>

        </div>

        <div class="card-body">

            <p><strong>Invoice No:</strong> <span th:text="${order.id}"></span></p>

            <p><strong>Name:</strong> <span th:text="${order.customerName}"></span></p>

            <p><strong>Email:</strong> <span th:text="${order.email}"></span></p>

            <p><strong>Address:</strong> <span th:text="${order.address}"></span></p>

            <p><strong>Date:</strong> <span th:text="${order.orderDate}"></span></p>

            <hr>

            <h4>
                Total :
                ₹ <span th:text="${order.totalAmount}"></span>
            </h4>

            <hr>

            <button onclick="window.print()"
                    class="btn btn-success">

                Print Invoice

            </button>

            <a href="/products"
               class="btn btn-primary">

                Continue Shopping

            </a>

        </div>

    </div>

</div>

</body>
</html>
