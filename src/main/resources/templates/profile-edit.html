<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Edit Profile</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="col-md-6 mx-auto">

        <div class="card shadow">

            <div class="card-header bg-primary text-white">

                <h3>Edit Profile</h3>

            </div>

            <div class="card-body">

                <form th:action="@{/profile/update}"
                      method="post"
                      th:object="${user}">

                    <div class="mb-3">

                        <label>Full Name</label>

                        <input type="text"
                               class="form-control"
                               th:field="*{fullName}">

                    </div>

                    <div class="mb-3">

                        <label>Email</label>

                        <input type="email"
                               class="form-control"
                               th:field="*{email}"
                               readonly>

                    </div>

                    <div class="mb-3">

                        <label>Phone</label>

                        <input type="text"
                               class="form-control"
                               th:field="*{phone}">

                    </div>

                    <div class="mb-3">

                        <label>Address</label>

                        <textarea class="form-control"
                                  th:field="*{address}">
                        </textarea>

                    </div>

                    <button class="btn btn-success">

                        Save Changes

                    </button>

                    <a href="/profile"
                       class="btn btn-secondary">

                        Cancel

                    </a>

                </form>

            </div>

        </div>

    </div>

</div>

</body>

</html>
