<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>ShopEase - E-Commerce Store</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

</head>

<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">

    <div class="container">

        <a class="navbar-brand fw-bold" href="/products">
            🛒 ShopEase
        </a>

        <form class="d-flex"
              th:action="@{/products}"
              method="get">

            <!-- Search -->
            <input class="form-control me-2"
                   type="search"
                   name="keyword"
                   th:value="${keyword}"
                   placeholder="Search Products...">

            <!-- Category Dropdown -->
            <select class="form-select me-2"
                    name="category">

                <option value="">All Categories</option>

                <option th:each="cat : ${categories}"
                        th:value="${cat.id}"
                        th:text="${cat.name}"
                        th:selected="${selectedCategory == cat.id}">
                </option>

            </select>

            <button class="btn btn-outline-light">
                <i class="bi bi-search"></i>
                Search
            </button>

        </form>

        <div>

            <a href="/products/new"
               class="btn btn-success">

                <i class="bi bi-plus-circle"></i>
                Add Product

            </a>
            <a href="/categories"
               class="btn btn-info ms-2">

                <i class="bi bi-tags-fill"></i>

                Categories

            </a>
            <a href="/cart"
               class="btn btn-warning ms-2 position-relative">

                <i class="bi bi-cart-fill"></i>
                Cart

                <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
                      th:text="${cartCount}">
                </span>

            </a>

        </div>

    </div>

</nav>

<div class="container mt-5">

    <div class="row">

        <div class="col-md-4 mb-4"
             th:each="product : ${products}">

            <div class="card shadow-lg h-100 border-0">

                <!-- Product Image -->

                <div th:if="${product.imageName != null}">

                    <a th:href="@{/products/{id}(id=${product.id})}">

                        <img th:src="@{/images/{img}(img=${product.imageName})}"
                             class="card-img-top"
                             style="height:250px;object-fit:cover;">

                    </a>

                </div>

                <div th:unless="${product.imageName != null}">

                    <a th:href="@{/products/{id}(id=${product.id})}">

                        <img src="https://placehold.co/600x400?text=No+Image"
                             class="card-img-top"
                             style="height:250px;object-fit:cover;">

                    </a>

                </div>

                <div class="card-body d-flex flex-column">

                    <h4>

                        <a th:href="@{/products/{id}(id=${product.id})}"
                           class="text-decoration-none text-dark"
                           th:text="${product.name}">
                        </a>

                    </h4>

                    <p class="text-muted"
                       th:text="${product.description}">
                    </p>

                    <h4 class="text-success fw-bold">

                        ₹ <span th:text="${product.price}"></span>

                    </h4>

                    <p>

                        <strong>Stock :</strong>

                        <span class="badge bg-success"
                              th:if="${product.stock > 0}"
                              th:text="${product.stock + ' Available'}">
                        </span>

                        <span class="badge bg-danger"
                              th:if="${product.stock == 0}">
                            Out of Stock
                        </span>

                    </p>

                    <p class="mb-3">

                        <strong>Category :</strong>

                        <span class="badge bg-primary"
                              th:text="${product.category != null ? product.category.name : 'No Category'}">
                        </span>

                    </p>

                    <div class="mt-auto d-grid gap-2">

                        <!-- View -->

                        <a th:href="@{/products/{id}(id=${product.id})}"
                           class="btn btn-primary">

                            <i class="bi bi-eye-fill"></i>
                            View

                        </a>

                        <!-- Add to Cart -->

                        <a th:href="@{/cart/add/{id}(id=${product.id})}"
                           class="btn btn-success">

                            <i class="bi bi-cart-plus-fill"></i>
                            Add to Cart

                        </a>

                        <div class="d-flex justify-content-between">

                            <a th:href="@{/products/edit/{id}(id=${product.id})}"
                               class="btn btn-warning">

                                <i class="bi bi-pencil-square"></i>
                                Edit

                            </a>

                            <a th:href="@{/products/delete/{id}(id=${product.id})}"
                               class="btn btn-danger"
                               onclick="return confirm('Delete this product?')">

                                <i class="bi bi-trash-fill"></i>
                                Delete

                            </a>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

<footer class="bg-dark text-white text-center py-4 mt-5">

    <div class="container">

        <h5>🛒 ShopEase</h5>

        <p class="mb-1">

            Simple • Fast • Reliable

        </p>

        <small>

            © 2026 ShopEase. All Rights Reserved.

            <br>

            Built with ❤️ using Spring Boot, Thymeleaf & Bootstrap

        </small>

    </div>

</footer>

</body>

</html>
