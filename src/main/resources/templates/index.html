<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>ShopEase - E-Commerce Store</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

</head>

<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">

    <div class="container">

        <a class="navbar-brand fw-bold" href="/products">
            🛒 ShopEase
        </a>

        <form class="d-flex"
              th:action="@{/products}"
              method="get">

            <input
                    class="form-control me-2"
                    type="search"
                    name="keyword"
                    th:value="${keyword}"
                    placeholder="Search Products...">

            <button
                    class="btn btn-outline-light">
                <i class="bi bi-search"></i>
                Search
            </button>

        </form>

        <a href="/products/new"
           class="btn btn-success">

            <i class="bi bi-plus-circle"></i>

            Add Product

        </a>

    </div>

</nav>

<div class="container mt-5">

    <div class="row">

        <div class="col-md-4 mb-4"
             th:each="product : ${products}">

            <div class="card shadow-lg h-100 border-0">

                <!-- Product Image -->

                <div th:if="${product.imageName != null}">

                    <a th:href="@{/products/{id}(id=${product.id})}">

                        <img
                                th:src="@{/images/{img}(img=${product.imageName})}"
                                class="card-img-top"
                                style="height:250px;object-fit:cover;">

                    </a>

                </div>

                <!-- Default Image -->

                <div th:unless="${product.imageName != null}">

                    <a th:href="@{/products/{id}(id=${product.id})}">

                        <img
                                src="https://placehold.co/600x400?text=No+Image"
                                class="card-img-top"
                                style="height:250px;object-fit:cover;">

                    </a>

                </div>

                <div class="card-body d-flex flex-column">

                    <!-- Product Name -->

                    <h4>

                        <a
                                th:href="@{/products/{id}(id=${product.id})}"
                                class="text-decoration-none text-dark"
                                th:text="${product.name}">

                        </a>

                    </h4>

                    <!-- Description -->

                    <p class="text-muted"
                       th:text="${product.description}">
                    </p>

                    <!-- Price -->

                    <h4 class="text-success fw-bold">

                        ₹ <span th:text="${product.price}"></span>

                    </h4>

                    <!-- Stock -->

                    <p>

                        <strong>Stock :</strong>

                        <span
                                class="badge bg-success"
                                th:if="${product.stock > 0}"
                                th:text="${product.stock + ' Available'}">
                        </span>

                        <span
                                class="badge bg-danger"
                                th:if="${product.stock == 0}">
                            Out of Stock
                        </span>

                    </p>

                    <div class="mt-auto">

                        <!-- View -->

                        <a
                                th:href="@{/products/{id}(id=${product.id})}"
                                class="btn btn-primary">

                            <i class="bi bi-eye-fill"></i>

                            View

                        </a>

                        <!-- Edit -->
                        <a href="/cart" class="btn btn-primary ms-2">
                            <i class="bi bi-cart-fill"></i>
                            Cart
                        </a>
                        <a
                                th:href="@{/products/edit/{id}(id=${product.id})}"
                                class="btn btn-warning">

                            <i class="bi bi-pencil-square"></i>

                            Edit

                        </a>

                        <!-- Delete -->

                        <a
                                th:href="@{/products/delete/{id}(id=${product.id})}"
                                class="btn btn-danger"
                                onclick="return confirm('Delete this product?')">

                            <i class="bi bi-trash-fill"></i>

                            Delete

                        </a>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

<footer class="bg-dark text-white text-center py-4 mt-5">

    <div class="container">

        <h5>🛒 ShopEase</h5>

        <p class="mb-1">
            Simple • Fast • Reliable
        </p>

        <small>

            © 2026 ShopEase. All Rights Reserved.

            <br>

            Built with ❤️ using Spring Boot, Thymeleaf & Bootstrap

        </small>

    </div>

</footer>

</body>

</html>
