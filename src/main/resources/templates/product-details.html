<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title th:text="${product.name}">Product Details</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <style>

        body{
            background:#f5f5f5;
        }

        .product-card{
            border:none;
            border-radius:20px;
            overflow:hidden;
            box-shadow:0 15px 40px rgba(0,0,0,.12);
        }

        .product-img{
            height:450px;
            object-fit:cover;
            border-radius:20px;
        }

        .price{
            color:#198754;
            font-size:35px;
            font-weight:bold;
        }

        .rating{
            color:#ffc107;
            font-size:22px;
        }

        .btn{
            border-radius:30px;
        }

    </style>

</head>

<body>

<div th:replace="navbar :: navbar"></div>

<div class="container mt-5">

    <div class="card product-card">

        <div class="row g-0">

            <div class="col-md-5 p-4 text-center">

                <img th:if="${product.imageName!=null}"
                     th:src="@{'/uploads/products/' + ${product.imageName}}"
                     class="img-fluid product-img">

                <img th:if="${product.imageName==null}"
                     src="https://placehold.co/600x500?text=No+Image"
                     class="img-fluid product-img">

            </div>

            <div class="col-md-7">

                <div class="card-body p-5">

                    <span class="badge bg-primary fs-6"
                          th:text="${product.category.name}">
                    </span>

                    <h2 class="mt-3 fw-bold"
                        th:text="${product.name}">
                    </h2>

                    <div class="rating mb-3">

                        ★★★★☆

                        <small class="text-muted">
                            (4.5)
                        </small>

                    </div>

                    <h2 class="price">

                        ₹ <span th:text="${product.price}"></span>

                    </h2>

                    <p class="mt-3"
                       th:text="${product.description}">
                    </p>

                    <p>

                        <strong>Availability :</strong>

                        <span class="badge bg-success"
                              th:if="${product.stock>0}">
                            In Stock
                        </span>

                        <span class="badge bg-danger"
                              th:if="${product.stock==0}">
                            Out Of Stock
                        </span>

                    </p>

                    <div class="mt-4 d-grid gap-3">

                        <a th:href="@{/cart/add/{id}(id=${product.id})}"
                           class="btn btn-success btn-lg">

                            <i class="bi bi-cart-plus-fill"></i>

                            Add To Cart

                        </a>

                        <form th:action="@{/orders/buy}"
                              method="get">

                            <input type="hidden"
                                   name="productId"
                                   th:value="${product.id}">

                            <button type="submit"
                                    class="btn btn-warning btn-lg w-100 fw-bold">

                                <i class="bi bi-lightning-fill"></i>

                                Buy Now

                            </button>

                        </form>
                        <a href="/products"
                           class="btn btn-outline-primary">

                            <i class="bi bi-arrow-left"></i>

                            Continue Shopping

                        </a>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

</body>

</html>
