<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title th:text="${product.name}">Product Details</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow">

        <div class="row g-0">

            <!-- Product Image -->

            <div class="col-md-5">

                <img th:if="${product.imageName != null}"
                     th:src="@{/images/{img}(img=${product.imageName})}"
                     class="img-fluid rounded-start"
                     style="height:100%;object-fit:cover;">

                <img th:unless="${product.imageName != null}"
                     src="https://placehold.co/600x400?text=No+Image"
                     class="img-fluid rounded-start"
                     style="height:100%;object-fit:cover;">

            </div>

            <!-- Product Details -->

            <div class="col-md-7">

                <div class="card-body">

                    <h2 class="card-title"
                        th:text="${product.name}">
                    </h2>

                    <p>

                        <strong>Category :</strong>

                        <span class="badge bg-primary"
                              th:text="${product.category != null ? product.category.name : 'No Category'}">
                        </span>

                    </p>

                    <h3 class="text-success">

                        ₹ <span th:text="${product.price}"></span>

                    </h3>

                    <hr>

                    <p class="card-text"
                       th:text="${product.description}">
                    </p>

                    <p>

                        <strong>Stock :</strong>

                        <span class="badge bg-success"
                              th:text="${product.stock}">
                        </span>

                    </p>

                    <a href="/products"
                       class="btn btn-secondary">

                        <i class="bi bi-arrow-left"></i>

                        Back

                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

</body>

</html>
