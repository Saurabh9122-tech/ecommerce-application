<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Shopping Cart</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

</head>

<body class="bg-light">

<div th:replace="navbar :: navbar"></div>

<div class="container mt-5">

    <h2 class="mb-4">

        <i class="bi bi-cart-fill"></i>

        Shopping Cart

    </h2>

    <div th:if="${#lists.isEmpty(cartItems)}">

        <div class="card shadow text-center p-5">

            <i class="bi bi-cart-x display-1 text-secondary"></i>

            <h3 class="mt-3">

                Your Cart is Empty

            </h3>

            <p>

                Add some amazing products.

            </p>

            <a href="/products"
               class="btn btn-primary">

                Continue Shopping

            </a>

        </div>

    </div>

    <div class="row" th:unless="${#lists.isEmpty(cartItems)}">

        <div class="col-lg-8">

            <div class="card shadow mb-3"
                 th:each="item : ${cartItems}">

                <div class="card-body">

                    <div class="row align-items-center">

                        <div class="col-md-3">

                            <img
                                    th:src="@{'/uploads/products/' + ${item.product.imageName}}"
                                    class="img-fluid rounded">

                        </div>

                        <div class="col-md-4">

                            <h5 th:text="${item.product.name}"></h5>

                            <h4 class="text-success">

                                ₹ <span th:text="${item.product.price}"></span>

                            </h4>

                        </div>

                        <div class="col-md-3 text-center">

                            <a
                                    class="btn btn-danger btn-sm"

                                    th:href="@{/cart/decrease/{id}(id=${item.id})}">

                                <i class="bi bi-dash"></i>

                            </a>

                            <span class="mx-3 fw-bold"
                                  th:text="${item.quantity}"></span>

                            <a
                                    class="btn btn-success btn-sm"

                                    th:href="@{/cart/increase/{id}(id=${item.id})}">

                                <i class="bi bi-plus"></i>

                            </a>

                        </div>

                        <div class="col-md-2 text-end">

                            <h5>

                                ₹ <span th:text="${item.totalPrice}"></span>

                            </h5>

                            <a
                                    class="btn btn-outline-danger btn-sm"

                                    th:href="@{/cart/remove/{id}(id=${item.id})}">

                                Remove

                            </a>

                        </div>

                    </div>

                </div>

            </div>

        </div>

        <div class="col-lg-4">

            <div class="card shadow">

                <div class="card-header bg-dark text-white">

                    Order Summary

                </div>

                <div class="card-body">

                    <p>

                        Items

                        <span class="float-end"
                              th:text="${#lists.size(cartItems)}"></span>

                    </p>

                    <p>

                        Shipping

                        <span class="float-end text-success">

                            FREE

                        </span>

                    </p>

                    <hr>

                    <h4>

                        Total

                        <span class="float-end text-success">

                            ₹ <span th:text="${grandTotal}"></span>

                        </span>

                    </h4>

                    <hr>

                    <a href="/orders/checkout"
                       class="btn btn-success w-100">

                        Proceed To Checkout

                    </a>

                    <a href="/products"
                       class="btn btn-outline-primary w-100 mt-2">

                        Continue Shopping

                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

</body>

</html>
