<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Shopping Cart</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

</head>

<body class="bg-light">

<div class="container mt-5">

    <h2 class="mb-4">

        <i class="bi bi-cart-fill"></i>

        Shopping Cart

    </h2>

    <table class="table table-bordered table-hover align-middle bg-white">

        <thead class="table-dark">

        <tr>

            <th>Image</th>

            <th>Product</th>

            <th>Price</th>

            <th>Quantity</th>

            <th>Total</th>

            <th>Action</th>

        </tr>

        </thead>

        <tbody>

        <tr th:each="item : ${cartItems}">

            <td width="120">

                <img th:src="@{/images/{img}(img=${item.product.imageName})}"
                     width="100"
                     class="img-thumbnail">

            </td>

            <td th:text="${item.product.name}"></td>

            <td>

                ₹ <span th:text="${item.product.price}"></span>

            </td>

            <td>

                <a class="btn btn-sm btn-danger"

                   th:href="@{/cart/decrease/{id}(id=${item.id})}">

                    -

                </a>

                <span class="mx-2"
                      th:text="${item.quantity}">
    </span>

                <a class="btn btn-sm btn-success"

                   th:href="@{/cart/increase/{id}(id=${item.id})}">

                    +

                </a>

            </td>
            <td>

                ₹ <span th:text="${item.totalPrice}"></span>

            </td>

            <td>

                <a class="btn btn-danger btn-sm"
                   th:href="@{/cart/remove/{id}(id=${item.id})}">

                    Remove

                </a>

            </td>

        </tr>

        </tbody>

    </table>

    <div class="text-end">

        <h3>

            Grand Total :

            <span class="text-success">

                ₹ <span th:text="${grandTotal}"></span>

            </span>

        </h3>

    </div>

    <a href="/products"
       class="btn btn-primary mt-3">

        Continue Shopping

    </a>

</div>

</body>

</html>
