<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>My Wishlist</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <style>

        body{
            background:#f4f6f9;
        }

        .card{
            border:none;
            border-radius:18px;
            transition:.3s;
            box-shadow:0 10px 25px rgba(0,0,0,.08);
        }

        .card:hover{
            transform:translateY(-6px);
        }

        img{
            height:220px;
            object-fit:cover;
        }

    </style>

</head>

<body>

<div th:replace="navbar :: navbar"></div>

<div class="container mt-5">

    <h2 class="mb-4">

        ❤️ My Wishlist

    </h2>

    <div class="row">

        <div class="col-md-4 mb-4"
             th:each="item : ${items}">

            <div class="card h-100">

                <img th:if="${item.product.imageName!=null}"
                     th:src="@{/images/{img}(img=${item.product.imageName})}"
                     class="card-img-top">

                <img th:unless="${item.product.imageName!=null}"
                     src="https://placehold.co/600x400?text=No+Image"
                     class="card-img-top">
                <div class="card-body">

                    <a th:href="@{/wishlist/remove/{id}(id=${item.product.id})}"
                       class="text-danger fs-3 float-end">

                        <i class="bi bi-heart-fill"></i>

                    </a>


                    <h5 th:text="${item.product.name}"></h5>


                    <h4 class="text-success">

                        ₹ <span th:text="${item.product.price}"></span>

                    </h4>


                    <p class="text-muted"
                       th:text="${item.product.description}">
                    </p>

                </div>

                <div class="card-footer bg-white border-0">

                    <a th:href="@{/cart/add/{id}(id=${item.product.id})}"
                       class="btn btn-success w-100 mb-2">

                        <i class="bi bi-cart-plus"></i>

                        Add To Cart

                    </a>


                    <a th:href="@{/wishlist/remove/{id}(id=${item.product.id})}"
                       class="btn btn-outline-danger w-100">

                        <i class="bi bi-heart-fill"></i>

                        Remove From Wishlist

                    </a>

                </div>
            </div>

        </div>

    </div>

    <div class="text-center mt-5"
         th:if="${#lists.isEmpty(items)}">

        <i class="bi bi-heart display-1 text-danger"></i>

        <h3>No products in your wishlist</h3>

        <a href="/products"
           class="btn btn-primary mt-3">

            Continue Shopping

        </a>

    </div>


</div>

</body>

</html>
