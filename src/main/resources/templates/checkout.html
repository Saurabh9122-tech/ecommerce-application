<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Checkout - ShopEase</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>


<body class="bg-light">


<div class="container mt-5">


    <div class="row">


        <!-- Cart Summary -->

        <div class="col-md-5">


            <div class="card shadow">


                <div class="card-header bg-dark text-white">

                    <h4>
                        Order Summary
                    </h4>

                </div>


                <div class="card-body">


                    <div th:each="item : ${cartItems}"
                         class="border-bottom mb-3 pb-2">


                        <h5 th:text="${item.product.name}">
                        </h5>


                        <p>

                            Quantity :
                            <span th:text="${item.quantity}"></span>

                        </p>


                        <p>

                            Price :
                            ₹
                            <span th:text="${item.totalPrice}">
                            </span>

                        </p>


                    </div>



                    <hr>


                    <h3 class="text-success">

                        Total :
                        ₹
                        <span th:text="${grandTotal}">
                        </span>

                    </h3>


                </div>


            </div>


        </div>





        <!-- Checkout Form -->

        <div class="col-md-7">


            <div class="card shadow">


                <div class="card-header bg-success text-white">

                    <h3>
                        Checkout
                    </h3>

                </div>


                <div class="card-body">


                    <form th:action="@{/orders/place}"
                          th:object="${order}"
                          method="post">


                        <div class="mb-3">

                            <label>
                                Name
                            </label>

                            <input class="form-control"
                                   th:field="*{customerName}"
                                   required>

                        </div>




                        <div class="mb-3">

                            <label>
                                Email
                            </label>

                            <input type="email"
                                   class="form-control"
                                   th:field="*{email}"
                                   required>

                        </div>




                        <div class="mb-3">

                            <label>
                                Address
                            </label>


                            <textarea class="form-control"
                                      rows="3"
                                      th:field="*{address}"
                                      required>
                            </textarea>


                        </div>




                        <button type="submit" class="btn btn-success">
                            Proceed to Payment
                        </button>


                    </form>


                </div>


            </div>


        </div>



    </div>


</div>



</body>

</html>
