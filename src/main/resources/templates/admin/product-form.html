<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>
        Product Management
    </title>


    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">


    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
          rel="stylesheet">


    <style>


        body{

            background:linear-gradient(
                    135deg,
                    #eef2f7,
                    #ffffff
            );

            min-height:100vh;

        }



        .product-card{

            border:none;

            border-radius:20px;

            box-shadow:
                    0 10px 30px rgba(0,0,0,.12);

            overflow:hidden;

        }



        .header{

            background:
                    linear-gradient(
                            135deg,
                            #0d6efd,
                            #6610f2
                    );

            color:white;

            padding:25px;

        }



        .form-control,
        .form-select{

            border-radius:12px;

            padding:12px;

        }



        .form-control:focus,
        .form-select:focus{

            box-shadow:
                    0 0 0 .25rem rgba(13,110,253,.2);

        }



        label{

            font-weight:600;

        }



        .image-preview{

            width:180px;

            height:180px;

            object-fit:contain;

            border-radius:15px;

            border:2px dashed #ddd;

            padding:10px;

            background:white;

        }



        .btn{

            border-radius:12px;

            padding:10px 25px;

            font-weight:600;

        }


    </style>


</head>



<body>



<div class="container py-5">



    <div class="row justify-content-center">


        <div class="col-lg-8">



            <div class="card product-card">



                <div class="header">


                    <h3 class="mb-0">


                        <i class="bi bi-box-seam"></i>


                        <span th:text="${product.id == null ?
                        'Add New Product' :
                        'Edit Product'}">

                        Product

                        </span>


                    </h3>


                    <p class="mb-0 mt-2 opacity-75">

                        Manage your store products

                    </p>


                </div>





                <div class="card-body p-4">





                    <form th:action="@{/admin/products/save}"

                          th:object="${product}"

                          method="post"

                          enctype="multipart/form-data">



                        <input type="hidden"
                               th:field="*{id}">





                        <!-- Name -->


                        <div class="mb-4">


                            <label>

                                Product Name

                            </label>


                            <input type="text"

                                   class="form-control"

                                   th:field="*{name}"

                                   placeholder="Enter product name">


                            <small class="text-danger"

                                   th:if="${#fields.hasErrors('name')}"

                                   th:errors="*{name}">

                            </small>


                        </div>







                        <!-- Description -->


                        <div class="mb-4">


                            <label>

                                Description

                            </label>


                            <textarea

                                    class="form-control"

                                    rows="4"

                                    th:field="*{description}"

                                    placeholder="Enter product description">

                            </textarea>


                        </div>







                        <div class="row">



                            <!-- Price -->


                            <div class="col-md-6 mb-4">


                                <label>

                                    Price ₹

                                </label>


                                <input type="number"

                                       step="0.01"

                                       class="form-control"

                                       th:field="*{price}"

                                       placeholder="0">


                                <small class="text-danger"

                                       th:if="${#fields.hasErrors('price')}"

                                       th:errors="*{price}">

                                </small>


                            </div>





                            <!-- Stock -->


                            <div class="col-md-6 mb-4">


                                <label>

                                    Stock Quantity

                                </label>


                                <input type="number"

                                       class="form-control"

                                       th:field="*{stock}"

                                       placeholder="0">


                                <small class="text-danger"

                                       th:if="${#fields.hasErrors('stock')}"

                                       th:errors="*{stock}">

                                </small>


                            </div>


                        </div>








                        <!-- Category -->


                        <div class="mb-4">


                            <label>

                                Category

                            </label>



                            <select class="form-select"

                                    th:field="*{category.id}">


                                <option value="">

                                    Select Category

                                </option>



                                <option

                                        th:each="cat:${categories}"

                                        th:value="${cat.id}"

                                        th:text="${cat.name}">

                                </option>


                            </select>


                        </div>









                        <!-- Image -->


                        <div class="mb-4">


                            <label>

                                Product Image

                            </label>


                            <input type="file"

                                   class="form-control"

                                   name="image"

                                   accept="image/*"

                                   onchange="previewImage(event)">





                            <div class="mt-3">


                                <img id="preview"

                                     class="image-preview"

                                     th:if="${product.imageName != null}"

                                     th:src="@{'/uploads/products/' + ${product.imageName}}">


                                <img id="previewEmpty"

                                     class="image-preview"

                                     th:if="${product.imageName == null}"

                                     src="https://via.placeholder.com/180?text=No+Image">


                            </div>



                        </div>








                        <hr>





                        <div class="d-flex justify-content-between">


                            <a th:href="@{/admin/products}"

                               class="btn btn-outline-secondary">


                                <i class="bi bi-arrow-left"></i>

                                Back


                            </a>





                            <button type="submit"

                                    class="btn btn-primary">


                                <i class="bi bi-save"></i>


                                Save Product


                            </button>



                        </div>





                    </form>



                </div>


            </div>


        </div>


    </div>


</div>






<script>


    function previewImage(event){


        let image =
            document.getElementById("preview");


        if(!image){


            image =
                document.getElementById("previewEmpty");


        }


        image.src =
            URL.createObjectURL(event.target.files[0]);


    }



</script>




</body>

</html>
