<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Product Form</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header bg-primary text-white">

            <h3 th:text="${product.id == null ? 'Add Product' : 'Edit Product'}">
                Product Form
            </h3>

        </div>

        <div class="card-body">

            <form th:action="@{/products/save}"
                  th:object="${product}"
                  method="post"
                  enctype="multipart/form-data">

                <!-- Hidden Product ID -->
                <input type="hidden" th:field="*{id}"/>

                <!-- Product Name -->
                <div class="mb-3">

                    <label class="form-label">Product Name</label>

                    <input type="text"
                           class="form-control"
                           th:field="*{name}"
                           placeholder="Enter product name">

                    <div class="text-danger"
                         th:if="${#fields.hasErrors('name')}"
                         th:errors="*{name}">
                    </div>

                </div>

                <!-- Description -->
                <div class="mb-3">

                    <label class="form-label">Description</label>

                    <textarea class="form-control"
                              rows="4"
                              th:field="*{description}"
                              placeholder="Enter product description">
                    </textarea>

                </div>

                <!-- Price -->
                <div class="mb-3">

                    <label class="form-label">Price (₹)</label>

                    <input type="number"
                           step="0.01"
                           class="form-control"
                           th:field="*{price}">

                    <div class="text-danger"
                         th:if="${#fields.hasErrors('price')}"
                         th:errors="*{price}">
                    </div>

                </div>

                <!-- Stock -->
                <div class="mb-3">

                    <label class="form-label">Stock</label>

                    <input type="number"
                           class="form-control"
                           th:field="*{stock}">

                    <div class="text-danger"
                         th:if="${#fields.hasErrors('stock')}"
                         th:errors="*{stock}">
                    </div>

                </div>

                <!-- Category -->
                <div class="mb-3">

                    <label class="form-label">Category</label>

                    <select class="form-select"
                            th:field="*{category.id}">

                        <option value="">Select Category</option>

                        <option th:each="category : ${categories}"
                                th:value="${category.id}"
                                th:text="${category.name}">
                        </option>

                    </select>

                </div>

                <!-- Product Image -->
                <div class="mb-3">

                    <label class="form-label">Product Image</label>

                    <input type="file"
                           class="form-control"
                           name="image">

                    <div class="mt-3"
                         th:if="${product.imageName != null}">

                        <p class="fw-bold">Current Image</p>

                        <img th:src="@{/images/{img}(img=${product.imageName})}"
                             width="150"
                             class="img-thumbnail">

                    </div>

                </div>

                <!-- Buttons -->
                <button type="submit"
                        class="btn btn-primary">

                    Save Product

                </button>

                <a th:href="@{/products}"
                   class="btn btn-secondary">

                    Back

                </a>

            </form>

        </div>

    </div>

</div>

</body>

</html>
