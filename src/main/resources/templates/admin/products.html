<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Admin - Manage Products</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <style>

        body{

            background:#f4f6f9;

        }


        .page-card{

            border:none;

            border-radius:20px;

            box-shadow:0 10px 30px rgba(0,0,0,.1);

        }


        .product-img{

            width:80px;

            height:80px;

            object-fit:contain;

            border-radius:12px;

        }


        .table{

            vertical-align:middle;

        }


        .action-btn{

            border-radius:10px;

        }


        .header-box{

            background:
                    linear-gradient(
                            135deg,
                            #0d6efd,
                            #6610f2
                    );

            color:white;

            padding:25px;

            border-radius:20px;

        }


    </style>


</head>


<body>



<div class="container py-5">



    <div class="header-box mb-4 d-flex justify-content-between align-items-center">


        <div>

            <h2>

                <i class="bi bi-box-seam"></i>

                Manage Products

            </h2>


            <p class="mb-0">

                Add, edit and manage store inventory

            </p>


        </div>



        <a href="/admin/products/new"

           class="btn btn-light">


            <i class="bi bi-plus-circle"></i>

            Add Product


        </a>


    </div>






    <div class="card page-card">


        <div class="card-body p-4">



            <div th:if="${products.isEmpty()}"
                 class="text-center p-5">


                <i class="bi bi-box display-1 text-secondary"></i>


                <h4 class="mt-3">

                    No Products Found

                </h4>


            </div>

            <div class="table-responsive"
                 th:if="${!products.isEmpty()}">


                <table class="table table-hover">


                    <thead class="table-dark">


                    <tr>

                        <th>Image</th>

                        <th>Name</th>

                        <th>Category</th>

                        <th>Price</th>

                        <th>Stock</th>

                        <th>Actions</th>


                    </tr>


                    </thead>





                    <tbody>



                    <tr th:each="product : ${products}">



                        <td>


                            <img th:if="${product.imageName != null}"

                                 th:src="@{'/uploads/products/' + ${product.imageName}}"

                                 class="product-img">



                            <img th:if="${product.imageName == null}"

                                 src="/images/no-image.png"

                                 class="product-img">


                        </td>





                        <td>


                            <strong th:text="${product.name}">

                            </strong>


                        </td>






                        <td>


                            <span th:if="${product.category != null}"

                                  th:text="${product.category.name}">


                            </span>


                            <span th:if="${product.category == null}"

                                  class="badge bg-secondary">


                                No Category


                            </span>


                        </td>








                        <td>


                            <span class="fw-bold text-success">


                                ₹


                                <span th:text="${product.price}"></span>


                            </span>


                        </td>






                        <td>


                            <span class="badge bg-primary"

                                  th:text="${product.stock}">


                            </span>


                        </td>






                        <td>


                            <a th:href="@{/admin/products/edit/{id}(id=${product.id})}"

                               class="btn btn-warning btn-sm action-btn">


                                <i class="bi bi-pencil"></i>

                                Edit


                            </a>






                            <a th:href="@{/admin/products/delete/{id}(id=${product.id})}"

                               onclick="return confirm('Delete this product?')"

                               class="btn btn-danger btn-sm action-btn">


                                <i class="bi bi-trash"></i>

                                Delete


                            </a>


                        </td>





                    </tr>



                    </tbody>



                </table>


            </div>



        </div>


    </div>



</div>




</body>


</html>
