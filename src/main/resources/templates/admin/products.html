<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Manage Products</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="d-flex justify-content-between align-items-center mb-4">

        <h2>

            <i class="bi bi-box-seam"></i>

            Manage Products

        </h2>

        <a href="/admin/products/new"
           class="btn btn-success">

            <i class="bi bi-plus-circle"></i>

            Add Product

        </a>

    </div>

    <div class="card shadow">

        <div class="card-body">

            <table class="table table-hover align-middle">

                <thead class="table-dark">

                <tr>

                    <th>Image</th>

                    <th>Name</th>

                    <th>Category</th>

                    <th>Price</th>

                    <th>Stock</th>

                    <th width="180">Action</th>

                </tr>

                </thead>

                <tbody>

                <tr th:each="product : ${products}">

                    <td width="120">

                        <img th:if="${product.imageName != null}"
                             th:src="@{'/uploads/products/' + ${product.imageName}}"
                             width="80"
                             class="img-thumbnail">

                        <img th:if="${product.imageName == null}"
                             src="/images/no-image.png"
                             width="80"
                             class="img-thumbnail">

                    </td>

                    <td>

                        <b th:text="${product.name}"></b>

                    </td>

                    <td th:text="${product.category.name}"></td>

                    <td>

                        ₹ <span th:text="${product.price}"></span>

                    </td>

                    <td>

                        <span class="badge bg-success"
                              th:text="${product.stock}">
                        </span>

                    </td>

                    <td>

                        <a th:href="@{/admin/products/edit/{id}(id=${product.id})}"
                           class="btn btn-primary btn-sm">

                            <i class="bi bi-pencil-square"></i>

                            Edit

                        </a>

                        <a th:href="@{/admin/products/delete/{id}(id=${product.id})}"
                           class="btn btn-danger btn-sm">

                            <i class="bi bi-trash"></i>

                            Delete

                        </a>

                    </td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

</body>

</html>
