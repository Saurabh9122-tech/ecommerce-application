<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Admin Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
          rel="stylesheet">

    <style>

        body{
            background:#f5f7fb;
        }

        .dashboard-card{

            border:none;
            border-radius:18px;
            box-shadow:0 5px 20px rgba(0,0,0,.08);
            transition:.3s;

        }


        .dashboard-card:hover{

            transform:translateY(-5px);

        }


        .icon{

            font-size:35px;

        }


        .menu-card{

            border:none;
            border-radius:15px;
            box-shadow:0 4px 15px rgba(0,0,0,.08);
            transition:.3s;

        }


        .menu-card:hover{

            transform:scale(1.03);

        }

    </style>


</head>


<body>


<div class="container mt-5">


    <div class="d-flex justify-content-between align-items-center mb-4">

        <h2>

            <i class="bi bi-speedometer2 text-primary"></i>

            Admin Dashboard

        </h2>


        <a href="/logout"
           class="btn btn-danger">

            <i class="bi bi-box-arrow-right"></i>

            Logout

        </a>


    </div>



    <!-- Statistics -->


    <div class="row">


        <div class="col-md-3 mb-3">

            <div class="card dashboard-card bg-primary text-white">

                <div class="card-body text-center">

                    <i class="bi bi-box-seam icon"></i>

                    <h2 th:text="${productCount}">
                        0
                    </h2>

                    <h5>
                        Products
                    </h5>

                </div>

            </div>

        </div>



        <div class="col-md-3 mb-3">

            <div class="card dashboard-card bg-success text-white">

                <div class="card-body text-center">


                    <i class="bi bi-tags icon"></i>


                    <h2 th:text="${categoryCount}">
                        0
                    </h2>


                    <h5>
                        Categories
                    </h5>


                </div>

            </div>

        </div>




        <div class="col-md-3 mb-3">

            <div class="card dashboard-card bg-warning">

                <div class="card-body text-center">


                    <i class="bi bi-cart-check icon"></i>


                    <h2 th:text="${orderCount}">
                        0
                    </h2>


                    <h5>
                        Orders
                    </h5>


                </div>

            </div>

        </div>




        <div class="col-md-3 mb-3">

            <div class="card dashboard-card bg-danger text-white">


                <div class="card-body text-center">


                    <i class="bi bi-people icon"></i>


                    <h2 th:text="${userCount}">
                        0
                    </h2>


                    <h5>
                        Users
                    </h5>


                </div>


            </div>


        </div>


    </div>



    <hr class="my-4">



    <!-- Admin Menu -->


    <h4 class="mb-3">
        Management
    </h4>



    <div class="row">



        <div class="col-md-4 mb-3">


            <div class="card menu-card">


                <div class="card-body text-center">


                    <i class="bi bi-box-seam text-primary fs-1"></i>


                    <h4>
                        Products
                    </h4>


                    <p class="text-muted">
                        Add, Edit and Delete Products
                    </p>


                    <a href="/admin/products"
                       class="btn btn-primary">

                        Manage Products

                    </a>


                </div>


            </div>


        </div>




        <div class="col-md-4 mb-3">


            <div class="card menu-card">


                <div class="card-body text-center">


                    <i class="bi bi-tags text-success fs-1"></i>


                    <h4>
                        Categories
                    </h4>


                    <p class="text-muted">
                        Manage Product Categories
                    </p>


                    <a href="/admin/categories"
                       class="btn btn-success">

                        Manage Categories

                    </a>


                </div>


            </div>


        </div>





        <div class="col-md-4 mb-3">


            <div class="card menu-card">


                <div class="card-body text-center">


                    <i class="bi bi-cart-check text-warning fs-1"></i>


                    <h4>
                        Orders
                    </h4>


                    <p class="text-muted">
                        Update Order Status
                    </p>


                    <a href="/admin/orders"
                       class="btn btn-warning">

                        Manage Orders

                    </a>


                </div>


            </div>


        </div>


    </div>



</div>



</body>

</html>
